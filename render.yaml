services:
  - type: web
    name: new-age-private-leads-api
    runtime: node
    rootDir: webhook/private-leads-api
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 3030
      - key: ALLOWED_ORIGINS
        value: https://newage.ind.br,https://www.newage.ind.br,https://new-age-ind.vercel.app
      - key: INTERNAL_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
