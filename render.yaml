services:
  - type: web
    name: new-age-private-leads-api
    runtime: node
    rootDir: webhook/private-leads-api
    buildCommand: npm install --no-package-lock
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 3030
      - key: ALLOWED_ORIGINS
        value: https://newage.ind.br,https://www.newage.ind.br,https://new-age-ind.vercel.app
      - key: INTERNAL_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: PRIVATE_SHEETS_WEBHOOK
        sync: false

  - type: web
    name: new-age-whatsapp-zapi
    runtime: node
    rootDir: webhook/whatsapp-zapi
    buildCommand: npm install --no-package-lock
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 3020
      - key: ZAPI_INSTANCE_ID
        sync: false
      - key: ZAPI_INSTANCE_TOKEN
        sync: false
      - key: ZAPI_CLIENT_TOKEN
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://www.newage.ind.br
